[package]
name = "kv260_sigv_daemon"
version = "0.1.0"
edition = "2021"

[dependencies]
axum = { version = "=0.7.4", features = ["http1", "json"] }
base64 = "=0.22.0"
clap = { version = "=4.4.18", features = ["derive"] }
hex = "0.4"
hyper = { version = "=1.2.0", features = ["http1", "server"] }
hyper-util = { version = "=0.1.3", features = ["service", "tokio"] }
indexmap = "=2.2.6"
libc = "0.2"
memmap2 = "=0.9.4"
nix = { version = "0.29", features = ["poll"] }
serde = { version = "=1.0.197", features = ["derive"] }
serde_json = "=1.0.114"
thiserror = "=1.0.56"
tokio = { version = "=1.38.2", features = ["macros", "net", "rt-multi-thread", "signal", "time"] }
tracing = "=0.1.40"
tracing-subscriber = { version = "=0.3.18", features = ["env-filter", "fmt"] }
uuid = { version = "=1.7.0", features = ["serde", "v4"] }

[dev-dependencies]
tower = { version = "=0.5.1", features = ["util"] }
